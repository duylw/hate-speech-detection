version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mlops_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mlops_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mlops_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  s3:
    image: minio/minio:latest
    container_name: mlops_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  create_buckets:
    image: minio/mc:latest
    container_name: mlops_minio_init
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio http://s3:9000 admin password) do echo 'Waiting for MinIO...' && sleep 1; done; /usr/bin/mc mb --ignore-existing myminio/mlflow; /usr/bin/mc mb --ignore-existing myminio/vihsd-data; echo 'Buckets created successfully.'; exit 0; "

  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    container_name: mlops_mlflow
    restart: always
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - MLFLOW_S3_ENDPOINT_URL=http://s3:9000
      - MLFLOW_S3_IGNORE_TLS=true
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_healthy
      create_buckets:
        condition: service_completed_successfully
    command: >
      mlflow server  --backend-store-uri postgresql://postgres:postgres@db:5432/mlops_db  --default-artifact-root s3://mlflow/  --host 0.0.0.0  --port 5000

volumes:
  pgdata:
  miniodata:
